#This is workflow name
name: Hello Workflow
#runs on an automatic trigger, whenever change is pushes to branch
on:
  push: 
    branches: [main]
    
    paths:
      - '**.html'
      
#these are jobs inside the workflows
jobs:
     greet:
       #this is github-runner, each jobs run on runner
       runs-on: ubuntu-latest
       steps:
         - name: Say Hello 
           run: echo "Hello Dosto"

         - name: say hello to username
           run: echo "$USER"
       
     details:
         runs-on: ubuntu-latest
         steps:
           - name: show version
             run: docker --version && python --version
          

